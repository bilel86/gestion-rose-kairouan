{% extends 'base.html' %}
{% block title %}{% if LANGUAGE_CODE == 'fr' %}Nouvelle vente{% else %}New sale{% endif %}{% endblock %}
{% block content %}
<h4 class="mb-4"><i class="bi bi-cash-coin text-danger"></i> {% if LANGUAGE_CODE == 'fr' %}Enregistrer une vente{% else %}Record a sale{% endif %}</h4>
<div class="card" style="max-width:550px">
  <div class="card-body">
    <form method="post">{% csrf_token %}
      <div class="mb-3">
        <label class="form-label">{% if LANGUAGE_CODE == 'fr' %}Date{% else %}Date{% endif %}</label>
        <input type="date" name="date" class="form-control" value="{{ today }}" required>
      </div>
      <div class="mb-3">
        <label class="form-label">{% if LANGUAGE_CODE == 'fr' %}Quantité vendue (kg){% else %}Quantity sold (kg){% endif %}</label>
        <input type="number" name="quantite_kg" step="0.01" class="form-control" required>
      </div>
      <div class="mb-3">
        <label class="form-label">{% if LANGUAGE_CODE == 'fr' %}Prix/kg (TND){% else %}Price/kg (TND){% endif %}</label>
        <input type="number" name="prix_kg" step="0.001" class="form-control" required>
      </div>
      <div class="mb-3">
        <label class="form-label">{% if LANGUAGE_CODE == 'fr' %}Acheteur{% else %}Buyer{% endif %}</label>
        <input type="text" name="acheteur" class="form-control" placeholder="{% if LANGUAGE_CODE == 'fr' %}Nom de l'acheteur (optionnel){% else %}Buyer name (optional){% endif %}">
      </div>
      <div class="mb-3">
        <label class="form-label">{% if LANGUAGE_CODE == 'fr' %}Notes{% else %}Notes{% endif %}</label>
        <textarea name="notes" class="form-control" rows="2"></textarea>
      </div>
      <button type="submit" class="btn btn-danger w-100">
        <i class="bi bi-check-lg"></i> {% if LANGUAGE_CODE == 'fr' %}Enregistrer{% else %}Save{% endif %}
      </button>
    </form>
  </div>
</div>
{% endblock %}
